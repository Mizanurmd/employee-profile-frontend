<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar card">

    <div class="sidebar-header">DASHBOARD <p>{{email}}</p></div>

    <nav class="menu">
      <div>
        <div (click)="toggleMenu()" class="menu-item">
          <span>Management</span>
          <ng-container *ngIf="isExpanded; else collapsed">
            <i class="pi pi-chevron-down"></i>
          </ng-container>
          <ng-template #collapsed>
            <i class="pi pi-chevron-up"></i>
          </ng-template>
        </div>


        <a routerLink="/employee"  class="menu-item" routerLinkActive="active">Employee</a>
        <a routerLink="/teacher"  class="menu-item" routerLinkActive="active">Teacher</a>
        <a routerLink="/student"  class="menu-item" routerLinkActive="active">Student</a>
        <a routerLink="/course"  class="menu-item" routerLinkActive="active">Course</a>
         <a routerLink="/agent-register"  class="menu-item" routerLinkActive="active">Agent Register</a>


      </div>
  
      <a routerLink="/report" class="menu-item">Reports</a>
      <a routerLink="/settings" class="menu-item">Settings</a>
      <button class="menu-item btn btn-danger" (click)="logout()">
        Logout
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Header -->
    <div class="header">
      <p>{{email}}</p>
      <!-- Marquee -->
      <div class="marquee-content">
        Md. Mizanur Rahman (Full Stack Java Developer) Addie Software
        (ADDIE SOFT) Limited, Dhaka, Bangladesh.
      </div>
      <!-- end Marquee -->
    </div>
    <!-- End Herader -->
  </main>

  <!-- Footer -->

</div>
